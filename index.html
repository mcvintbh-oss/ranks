<!DOCTYPE html>
<html>
<head>
  <title>Ranks</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

  <h1>Top Ranks</h1>
  <div id="ranks"></div>

  <script>
    const container = document.getElementById("ranks");

    // EDIT NAMES HERE
    const players = [
      // add more names here (up to 50)
    ];

    for (let i = 0; i < 50; i++) {
      const name = players[i] || "Empty";

      const rankDiv = document.createElement("div");
      rankDiv.style.marginBottom = "20px";

      const title = document.createElement("h3");
      title.innerText = "Rank " + (i + 1);

      const img = document.createElement("img");
      img.width = 120;

      if (name !== "Empty") {
        img.src = "https://skinmc.net/api/v1/renders/profiles/" + name + "/armor-bust/500";
      }

      const text = document.createElement("p");
      text.innerText = name;

      rankDiv.appendChild(title);
      rankDiv.appendChild(img);
      rankDiv.appendChild(text);

      container.appendChild(rankDiv);
    }
  </script>

</body>
</html>
