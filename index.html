```html
<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>

  <style>
    body {
      font-family: Arial;
      background: #1a1a1a;
      color: white;
      padding: 20px;
    }

    .row {
      display: flex;
      align-items: center;
      background: #2a2a2a;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .rank {
      font-size: 30px;
      width: 50px;
      text-align: center;
      font-weight: bold;
    }

    .top1 { background: #f59e0b; }
    .top2 { background: #9ca3af; }
    .top3 { background: #d97706; }

    .avatar {
      width: 50px;
      height: 50px;
      margin: 0 15px;
      border-radius: 8px;
    }

    .name {
      flex: 1;
      font-size: 20px;
    }

    .points {
      background: #3a3a3a;
      padding: 8px 15px;
      border-radius: 8px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>🏆 Leaderboard</h1>
<div id="board"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "PASTE_HERE",
    authDomain: "PASTE_HERE",
    databaseURL: "PASTE_HERE",
    projectId: "PASTE_HERE"
  };

  firebase.initializeApp(firebaseConfig);

  const board = document.getElementById("board");

  firebase.database().ref("ranks").on("value", snapshot => {
    board.innerHTML = "";
    const data = snapshot.val() || {};

    for (let i = 1; i <= 50; i++) {
      const name = data[i]?.name || "Empty";
      const points = data[i]?.points || 0;

      const row = document.createElement("div");
      row.className = "row";

      if (i === 1) row.classList.add("top1");
      if (i === 2) row.classList.add("top2");
      if (i === 3) row.classList.add("top3");

      const rank = document.createElement("div");
      rank.className = "rank";
      rank.innerText = i;

      const img = document.createElement("img");
      img.className = "avatar";

      if (name !== "Empty") {
        img.src = "https://skinmc.net/api/v1/renders/profiles/" + name + "/face/100";
      }

      const nameDiv = document.createElement("div");
      nameDiv.className = "name";
      nameDiv.innerText = name;

      const pointsDiv = document.createElement("div");
      pointsDiv.className = "points";
      pointsDiv.innerText = points;

      row.appendChild(rank);
      row.appendChild(img);
      row.appendChild(nameDiv);
      row.appendChild(pointsDiv);

      board.appendChild(row);
    }
  });
</script>

</body>
</html>
