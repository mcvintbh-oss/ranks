```html
<!DOCTYPE html>
<html>
<head>
  <title>Top 50 Ranks</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    #ranks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .rank1 { border: 2px solid gold; }
    .rank2 { border: 2px solid silver; }
    .rank3 { border: 2px solid #cd7f32; }

    img {
      border-radius: 8px;
      margin: 10px 0;
    }
  </style>
</head>

<body>

  <h1>🏆 Top 50 Players</h1>
  <div id="ranks"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    // 🔴 PASTE YOUR FIREBASE CONFIG HERE
    const firebaseConfig = {
      apiKey: "PASTE_HERE",
      authDomain: "PASTE_HERE",
      databaseURL: "PASTE_HERE",
      projectId: "PASTE_HERE",
      storageBucket: "PASTE_HERE",
      messagingSenderId: "PASTE_HERE",
      appId: "PASTE_HERE"
    };

    firebase.initializeApp(firebaseConfig);

    const container = document.getElementById("ranks");

    firebase.database().ref("ranks").on("value", snapshot => {
      container.innerHTML = "";
      const data = snapshot.val() || {};

      for (let i = 1; i <= 50; i++) {
        const name = data[i] || "Empty";

        const card = document.createElement("div");
        card.className = "card";

        if (i === 1) card.classList.add("rank1");
        if (i === 2) card.classList.add("rank2");
        if (i === 3) card.classList.add("rank3");

        const title = document.createElement("h3");
        title.innerText = "#" + i;

        const img = document.createElement("img");
        img.width = 100;

        if (name !== "Empty") {
          img.src = "https://skinmc.net/api/v1/renders/profiles/" + name + "/armor-bust/500";
        }

        const text = document.createElement("p");
        text.innerText = name;

        card.appendChild(title);
        card.appendChild(img);
        card.appendChild(text);

        container.appendChild(card);
      }
    });
  </script>

</body>
</html>
```
